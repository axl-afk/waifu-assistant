<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waifu Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: rgb(217, 237, 226);
      width: 100vw; 
      height: 100vh; 
      overflow: hidden;
    }
    canvas { 
      display: block; 
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      font-size: 18px;
      text-align: center;
    }
    #loading span {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="loading">
    Loading waifu... 💫
    <span>please wait</span>
  </div>

  <canvas id="canvas"></canvas>

  <!-- Status indicator -->
  <div id="status" style="
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-family: sans-serif;
    font-size: 13px;
    background: rgba(0,0,0,0.3);
    padding: 4px 14px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
  ">Connecting...</div>

  <!-- Chat bubbles -->
  <div id="chat" style="
    position: absolute;
    bottom: 100px;
    left: 20px;
    width: 300px;
    max-height: 300px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    font-family: sans-serif;
  "></div>

  <!-- Input box -->
  <div style="
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  width: 500px;
  align-items: center;
">
  <input id="input" type="text" placeholder="Talk to Yuki..." style="
    flex: 1;
    padding: 12px 18px;
    border-radius: 24px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 15px;
    backdrop-filter: blur(10px);
    outline: none;
  " onkeydown="if(event.key==='Enter'){waifuAPI.sendMessage(document.getElementById('input').value); document.getElementById('input').value=''}" />
  
  <button onclick="waifuAPI.sendMessage(document.getElementById('input').value); document.getElementById('input').value=''" style="
    padding: 12px 20px;
    border-radius: 24px;
    border: none;
    background: rgba(255,255,255,0.3);
    color: white;
    font-size: 15px;
    cursor: pointer;
    backdrop-filter: blur(10px);
  ">Send</button>

  <!-- Mic button -->
  <button id="micBtn"
    onmousedown="waifuAPI.startRecording()"
    onmouseup="waifuAPI.stopRecording()"
    ontouchstart="waifuAPI.startRecording()"
    ontouchend="waifuAPI.stopRecording()"
    style="
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 107, 157, 0.6);
      color: white;
      font-size: 22px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
    ">🎤</button>
    <button id="autoBtn"
  onclick="waifuAPI.toggleAutoListen()"
  style="
    padding: 12px 16px;
    border-radius: 24px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    white-space: nowrap;
  ">🔁 Auto</button>
</div>

  <!-- Avatar switcher -->
  <div style="
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  ">
    <button onclick="waifuAPI.loadAvatar('2484111366324162525.vrm')" style="
      padding: 6px 12px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 12px;
      cursor: pointer;
    ">Avatar 1</button>
    <button onclick="waifuAPI.loadAvatar('3803401280262951642.vrm')" style="
      padding: 6px 12px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 12px;
      cursor: pointer;
    ">Avatar 2</button>
    <button onclick="waifuAPI.loadAvatar('9063535458662491846.vrm')" style="
      padding: 6px 12px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 12px;
      cursor: pointer;
    ">Avatar 3</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
