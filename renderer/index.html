<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waifu Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: rgb(217, 237, 226);
      width: 100vw; 
      height: 100vh; 
      overflow: hidden;
    }
    canvas { 
      display: block; 
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      font-size: 18px;
      text-align: center;
    }
    #loading span {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="loading">
    Loading waifu... 💫
    <span>please wait</span>
  </div>
  <canvas id="canvas"></canvas>
  <script type="module" src="./main.js"></script>
</body>
</html>
